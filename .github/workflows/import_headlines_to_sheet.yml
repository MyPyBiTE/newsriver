name: Import headlines into editorial sheet

on:
  workflow_dispatch:

  push:
    branches:
      - phase-8-sheet-import
    paths:
      - "scripts/import_headlines_to_sheet.py"
      - "requirements.txt"
      - ".github/workflows/import_headlines_to_sheet.yml"

  schedule:
    - cron: "20,50 * * * *"

permissions:
  contents: read

concurrency:
  group: import-headlines-to-editorial-sheet
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Import latest headlines into Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MYPYBITE_SHEET_ID: ${{ secrets.MYPYBITE_SHEET_ID }}
        run: python scripts/import_headlines_to_sheet.py --input headlines.json --limit 40
